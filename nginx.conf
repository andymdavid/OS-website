server {
    listen 80;
    server_name gitea.pages.otherstuff.ai;

    return 301 https://otherstuff.ai$request_uri;
}

server {
    listen 80;
    server_name www.otherstuff.ai;

    return 301 https://otherstuff.ai$request_uri;
}

server {
    listen 80 default_server;
    server_name otherstuff.ai;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;
    port_in_redirect off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "no-store, max-age=0, must-revalidate" always;

    # Proxy API requests to Node server
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Referer $http_referer;
    }

    # Serve prerendered route HTML without forcing a trailing-slash redirect
    # and return a real 404 for unknown paths instead of the homepage.
    # Short cache for HTML so updated content gets indexed quickly
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}

server {
    listen 80;
    server_name otherstuff.studio www.otherstuff.studio;

    return 301 https://otherstuff.ai$request_uri;
}
